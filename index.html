// Check if running from file:// protocol

  const warning = document.getElementById('warning');

const apiKeyInput = document.getElementById('apiKeyInput');
const saveKeyBtn = document.getElementById('saveKeyBtn');
const skipKeyBtn = document.getElementById('skipKeyBtn');

// Check for saved key in sessionStorage (not localStorage for security)
const savedKey = sessionStorage.getItem('mrTreeApiKey');
if (savedKey) {
  LLM_CONFIG.apiKey = savedKey;
  apiKeyModal.style.display = 'none';
  init();
}

saveKeyBtn.addEventListener('click', () => {
  const key = apiKeyInput.value.trim();
  if (key && key.startsWith('sk-')) {
    LLM_CONFIG.apiKey = key;
    sessionStorage.setItem('mrTreeApiKey', key);
    apiKeyModal.style.display = 'none';
    init();
  } else {
    alert('请输入有效的 API Key（以 sk- 开头）');
  }
});

skipKeyBtn.addEventListener('click', () => {
  apiKeyModal.style.display = 'none';
  init();
});

apiKeyInput.addEventListener('keypress', (e) => {
  if (e.key === 'Enter') saveKeyBtn.click();
});

// SECTION 4.5: LLM API INTEGRATION
// ============================================================
async function callLLM(messages, { search = false, temperature = 0.8, maxTokens = 400 } = {}) {
  const body = {
    model: LLM_CONFIG.model,
    messages,
    temperature,
    max_tokens: maxTokens,
    enable_thinking: false,
    stream: false
  };
  if (search && LLM_CONFIG.enableSearch) body.enable_search = true;

  const resp = await fetch(`${LLM_CONFIG.baseUrl}/chat/completions`, {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': `Bearer ${LLM_CONFIG.apiKey}`
    },
    body: JSON.stringify(body)
  });
  if (!resp.ok) throw new Error(`LLM ${resp.status}: ${resp.statusText}`);
  const data = await resp.json();
  return data.choices[0].message.content;
}

function extractJSON(text) {
  // Try markdown code block first
  const m1 = text.match(/```(?:json)?\s*([\s\S]*?)```/);
  if (m1) try { return JSON.parse(m1[1].trim()); } catch(e) {}
  // Try direct parse
  try { return JSON.parse(text.trim()); } catch(e) {}
  // Try to find JSON object in text
  const m2 = text.match(/\{[\s\S]*\}/);
  if (m2) return JSON.parse(m2[0]);
  throw new Error('Cannot extract JSON');
}

// --- News dialogue via LLM ---
const ANIMAL_TYPE_NAMES = { spring: '小鸟', summer: '蝴蝶', autumn: '松鼠', winter: '雪兔' };

async function fetchNewsDialogue(season) {
  const animalType = ANIMAL_TYPE_NAMES[season];
  const nameA = animalType + '甲';
  const nameB = animalType + '乙';

  console.log('[Dialogue] Fetching news for', season, '...');
  const content = await callLLM([
    { role: 'system', content: `你是一个创意对话写作助手。你需要为一个像素风桌面摆件写两只${animalType}的对话。它们住在一棵老梧桐树旁，名字叫${nameA}和${nameB}。` },
    { role: 'user', content: `请先搜索今天最新的1-2条热点新闻，然后创作一段${nameA}和${nameB}讨论这些新闻的对话。

要求：
- 口语化、活泼可爱，每句话25-50个字，不要太短
- 用动物的视角聊新闻，不要像播新闻稿
- 像两个好朋友自然聊天，内容可以稍微展开一点

请严格按以下JSON格式返回，不要有任何多余文字：
{
  "greet": "${nameA}的打招呼",
  "greetReply": "${nameB}的回应",
  "chat": [
    ["${nameA}说的话", "${nameB}说的话"],
    ["${nameA}说的话", "${nameB}说的话"],
    ["${nameA}说的话", "${nameB}说的话"],
    ["${nameA}说的话", "${nameB}说的话"]
  ],
  "bye": "${nameA}的告别",
  "byeReply": "${nameB}的回应",
  "newsTopics": "用一句话概括聊了什么新闻"
}` }
  ], { search: true, temperature: 0.85, maxTokens: 800 });

  const data = extractJSON(content);

  // Validate structure
  if (!data.greet || !data.chat || !Array.isArray(data.chat) || data.chat.length < 1) {
    throw new Error('Invalid dialogue structure');
  }

  // Transform to internal format: chat pairs -> flat [speaker, text] array
  const chatFlat = [];
  for (const pair of data.chat) {
    if (Array.isArray(pair) && pair.length >= 2) {
      chatFlat.push([0, String(pair[0])]);
      chatFlat.push([1, String(pair[1])]);
    }
  }

  return {
    greet: [0, String(data.greet)],
    greetReply: [1, String(data.greetReply || '嗯嗯！')],
    chat: chatFlat,
    bye: [0, String(data.bye || '走啦！下次见！')],
    byeReply: [1, String(data.byeReply || '拜拜~')],
    think: '', // will be fetched separately
    newsTopics: String(data.newsTopics || '')
  };
}

// --- LLM dialogue cache management ---
// Called from game loop; fetches dialogues during idle time
function updateLLMCache() {
  console.log('[Cache] updateLLMCache called, apiKey:', !!LLM_CONFIG.apiKey, 'busy:', llmBusy, 'cache:', llmCache.length, 'state:', smState, 'time:', gameTime, 'lastFetch:', llmLastFetchTime);
  if (!LLM_CONFIG.apiKey) { console.log('[Cache] No API key, skipping'); return; }
  if (llmBusy) { console.log('[Cache] Already busy, skipping'); return; }

  // If season changed, invalidate cache
  if (llmCacheSeason && llmCacheSeason !== currentSeason) {
    llmCache = [];
    llmCacheSeason = '';
    console.log('[Cache] Season changed, cache cleared');
  }

  // Don't fetch if cache is full
  if (llmCache.length >= LLM_CACHE_MAX) { console.log('[Cache] Cache full, skipping'); return; }

  // Respect cooldown between fetches
  const timeSinceLast = gameTime - llmLastFetchTime;
  if (timeSinceLast < LLM_FETCH_COOLDOWN) { console.log('[Cache] Cooldown active:', timeSinceLast.toFixed(1), 's <', LLM_FETCH_COOLDOWN); return; }

  // Only fetch during idle states (not during active dialogue)
  const idleStates = ['QUIET', 'COOLDOWN'];
  if (!idleStates.includes(smState)) { console.log('[Cache] Not idle state:', smState); return; }

  llmBusy = true;
  llmLastFetchTime = gameTime;
  const fetchSeason = currentSeason; // capture season at fetch time
  console.log('[Cache] Fetching dialogue for', fetchSeason, '(cache:', llmCache.length + '/' + LLM_CACHE_MAX + ')');

  fetchNewsDialogue(fetchSeason).then(data => {
    if (data && currentSeason === fetchSeason) {
      llmCacheSeason = fetchSeason;
      llmCache.push(data);
      console.log('[Cache] Stored! Cache size:', llmCache.length);
    }
  }).catch(e => {
    console.warn('[Cache] Fetch failed:', e.message);
  }).finally(() => { llmBusy = false; });
}

function hexToRgb(h) {
  return [parseInt(h.slice(1,3),16), parseInt(h.slice(3,5),16), parseInt(h.slice(5,7),16)];
}
function rgbToHex(r,g,b) {
  return '#' + [r,g,b].map(v => Math.max(0,Math.min(255,Math.round(v))).toString(16).padStart(2,'0')).join('');
}
function lerpColor(a,b,t) {
  const [r1,g1,b1] = hexToRgb(a), [r2,g2,b2] = hexToRgb(b);
  return rgbToHex(r1+(r2-r1)*t, g1+(g2-g1)*t, b1+(b2-b1)*t);
}
function darkenColor(hex, amt) {
  const [r,g,b] = hexToRgb(hex);
  return rgbToHex(r*(1-amt), g*(1-amt), b*(1-amt));
}
function seededRand(seed) {
  let x = Math.sin(seed * 127.1 + 311.7) * 43758.5453;
  return x - Math.floor(x);
}
function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
function easeInOut(t) { return t < 0.5 ? 2*t*t : -1 + (4-2*t)*t; }
function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

const canvas = document.getElementById('c');

function calcScale() {
  scale = Math.max(1, Math.min(
    Math.floor(window.innerWidth / BASE_W),
    Math.floor(window.innerHeight / BASE_H)
  ));
  canvas.width = BASE_W * scale;
  canvas.height = BASE_H * scale;
  ctx.imageSmoothingEnabled = false;
}

function drawPixel(x, y, color) {
  ctx.fillStyle = color;
  ctx.fillRect(Math.floor(x) * scale, Math.floor(y) * scale, scale, scale);
}
function drawRect(x, y, w, h, color) {
  ctx.fillStyle = color;
  ctx.fillRect(Math.floor(x) * scale, Math.floor(y) * scale, Math.ceil(w) * scale, Math.ceil(h) * scale);
}
function drawSprite(data, px, py, flipH) {
  for (let r = 0; r < data.length; r++) {
    const row = data[r];
    for (let c = 0; c < row.length; c++) {
      if (row[c]) {
        const x = flipH ? (px + row.length - 1 - c) : (px + c);
        drawPixel(x, py + r, row[c]);
      }
    }
  }
}

// SECTION 8: TIME OF DAY SYSTEM
// ============================================================
function getTimeOfDay() {
  const d = new Date();
  const h = d.getHours() + d.getMinutes() / 60;
  if (h >= 5 && h < 7)   return { period: 'dawn', t: (h - 5) / 2 };
  if (h >= 7 && h < 17)  return { period: 'day',  t: (h - 7) / 10 };
  if (h >= 17 && h < 19) return { period: 'dusk', t: (h - 17) / 2 };
  return { period: 'night', t: h >= 19 ? (h - 19) / 10 : (h + 5) / 10 };
}

function getSkyColors(season, tod) {
  const cfg = SEASON_CONFIG[season].sky;
  let top, bot;
  if (tod.period === 'day') {
    top = cfg.day[0]; bot = cfg.day[1];
  } else if (tod.period === 'night') {
    top = cfg.night[0]; bot = cfg.night[1];
  } else if (tod.period === 'dawn') {
    top = lerpColor(cfg.night[0], cfg.dawn[0], tod.t);
    bot = lerpColor(cfg.night[1], cfg.dawn[1], tod.t);
    if (tod.t > 0.5) {
      const t2 = (tod.t - 0.5) * 2;
      top = lerpColor(top, cfg.day[0], t2);
      bot = lerpColor(bot, cfg.day[1], t2);
    }
  } else {
    top = lerpColor(cfg.day[0], cfg.dusk[0], tod.t);
    bot = lerpColor(cfg.day[1], cfg.dusk[1], tod.t);
    if (tod.t > 0.5) {
      const t2 = (tod.t - 0.5) * 2;
      top = lerpColor(top, cfg.night[0], t2);
      bot = lerpColor(bot, cfg.night[1], t2);
    }
  }
  return { top, bot };
}

// ============================================================
function renderSky() {
  const tod = getTimeOfDay();
  const { top, bot } = getSkyColors(currentSeason, tod);
  const grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
  grad.addColorStop(0, top);
  grad.addColorStop(1, bot);
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  if (currentWeather === 'rain' || currentWeather === 'cloudy') {
    ctx.fillStyle = 'rgba(0,0,0,0.12)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
  }
}

function renderStars() {
  const tod = getTimeOfDay();
  let alpha = 0;
  if (tod.period === 'night') alpha = 1;
  else if (tod.period === 'dusk') alpha = Math.max(0, (tod.t - 0.5) * 2);
  else if (tod.period === 'dawn') alpha = Math.max(0, 1 - tod.t * 2);
  if (alpha <= 0) return;
  const t = gameTime;
  for (const s of stars) {
    const twinkle = (Math.sin(t * 1.5 + s.phase) + 1) * 0.5;
    const a = alpha * s.bright * (0.3 + twinkle * 0.7);
    if (a < 0.1) continue;
    ctx.globalAlpha = a;
    drawPixel(s.x, s.y, twinkle > 0.7 ? '#E3F2FD' : '#FFFFFF');
  }
  ctx.globalAlpha = 1;
}

function renderSunMoon() {
  const tod = getTimeOfDay();
  if (tod.period === 'day' || tod.period === 'dawn' || tod.period === 'dusk') {
    let progress, alpha;
    if (tod.period === 'day') { progress = tod.t; alpha = 1; }
    else if (tod.period === 'dawn') { progress = 0; alpha = tod.t; }
    else { progress = 1; alpha = 1 - tod.t; }
    if (alpha > 0.1 && currentWeather !== 'rain' && currentWeather !== 'fog') {
      const sx = 50 + progress * 380;
      const sy = 70 - Math.sin(progress * Math.PI) * 45;
      ctx.globalAlpha = alpha * 0.2;
      drawRect(sx - 3, sy - 3, 10, 10, '#FFF8E1');
      ctx.globalAlpha = alpha * 0.4;
      drawRect(sx - 1, sy - 1, 6, 6, '#FFF176');
      ctx.globalAlpha = alpha;
      drawRect(sx, sy, 4, 4, '#FFD54F');
      drawPixel(sx + 1, sy - 1, '#FFF176');
      drawPixel(sx + 2, sy - 1, '#FFF176');
      drawPixel(sx - 1, sy + 1, '#FFF176');
      drawPixel(sx + 4, sy + 2, '#FFF176');
      ctx.globalAlpha = 1;
    }
  }
  if (tod.period === 'night' || (tod.period === 'dusk' && tod.t > 0.6) || (tod.period === 'dawn' && tod.t < 0.4)) {
    let alpha = 1;
    if (tod.period === 'dusk') alpha = (tod.t - 0.6) * 2.5;
    if (tod.period === 'dawn') alpha = 1 - tod.t * 2.5;
    alpha = clamp(alpha, 0, 1);
    if (alpha > 0.05) {
      const mp = tod.period === 'night' ? tod.t : (tod.period === 'dusk' ? 0 : 1);
      const mx = 80 + mp * 320;
      const my = 50 - Math.sin(mp * Math.PI) * 30;
      ctx.globalAlpha = alpha * 0.15;
      drawRect(mx - 2, my - 2, 9, 9, '#E3F2FD');
      ctx.globalAlpha = alpha;
      drawRect(mx, my, 5, 5, '#ECEFF1');
      drawPixel(mx + 1, my, '#CFD8DC');
      drawPixel(mx, my + 1, '#CFD8DC');
      ctx.globalAlpha = alpha * 0.6;
      const { top } = getSkyColors(currentSeason, tod);
      drawPixel(mx + 3, my, top);
      drawPixel(mx + 4, my, top);
      drawPixel(mx + 4, my + 1, top);
      drawPixel(mx + 4, my + 2, top);
      drawPixel(mx + 3, my + 4, top);
      drawPixel(mx + 4, my + 3, top);
      drawPixel(mx + 4, my + 4, top);
      ctx.globalAlpha = 1;
    }
  }
}

function renderHills() {
  const cfg = SEASON_CONFIG[currentSeason];
  ctx.fillStyle = cfg.hill;
  ctx.beginPath();
  ctx.moveTo(0, GROUND_Y * scale);
  for (let x = 0; x <= BASE_W; x++) {
    const y = GROUND_Y - 8 - Math.sin(x * 0.015 + 1) * 12 - Math.sin(x * 0.008) * 6;
    ctx.lineTo(x * scale, y * scale);
  }
  ctx.lineTo(BASE_W * scale, GROUND_Y * scale);
  ctx.closePath();
  ctx.fill();
}

function renderGround() {
  const cfg = SEASON_CONFIG[currentSeason];
  drawRect(0, GROUND_Y, BASE_W, BASE_H - GROUND_Y, cfg.ground);
  for (let x = 0; x < BASE_W; x += 2) {
    for (let y = GROUND_Y; y < BASE_H; y += 2) {
      if (seededRand(x * 53 + y * 97) > 0.6) drawPixel(x, y, cfg.groundAlt);
    }
  }
  if (cfg.grassColors && cfg.grassColors.length > 0) {
    for (let x = 5; x < BASE_W; x += 4) {
      const h = 1 + Math.floor(seededRand(x * 37) * 3);
      const col = cfg.grassColors[Math.floor(seededRand(x * 71) * cfg.grassColors.length)];
      for (let dy = 0; dy < h; dy++) drawPixel(x, GROUND_Y - 1 - dy, col);
    }
  }
  if (currentSeason === 'winter') {
    for (let x = 10; x < BASE_W; x += 7) {
      const w = 2 + Math.floor(seededRand(x * 41) * 4);
      for (let dx = 0; dx < w; dx++) {
        drawPixel(x + dx, GROUND_Y - 1, '#F5F5F5');
        if (seededRand(x * 19 + dx) > 0.5) drawPixel(x + dx, GROUND_Y - 2, '#FAFAFA');
      }
    }
  }
  const rootCol = SEASON_CONFIG[currentSeason].trunk;
  drawRect(TREE_CX - 14, GROUND_Y - 1, 5, 2, rootCol);
  drawRect(TREE_CX + 3, GROUND_Y - 1, 4, 2, rootCol);
  drawRect(TREE_CX + 11, GROUND_Y - 1, 5, 2, rootCol);
  drawRect(TREE_CX - 20, GROUND_Y - 1, 3, 1, rootCol);
  drawRect(TREE_CX + 18, GROUND_Y - 1, 3, 1, rootCol);
}

// ============================================================
// SECTION 11: TREE GENERATION & RENDERING
// ============================================================
// Spreading, radial branch structure — wide canopy, branches reach far outward
const CX = TREE_CX, BY = TREE_BRANCH_Y;
const BRANCH_DEFS = [
  // === Primary limbs: 5 major branches radiating outward ===
  [CX, BY, CX - 55, BY - 25, 4],     // far left, slightly up
  [CX, BY, CX - 30, BY - 40, 4],     // upper left
  [CX, BY, CX + 3,  BY - 45, 3],     // straight up (central)
  [CX, BY, CX + 35, BY - 38, 4],     // upper right
  [CX, BY, CX + 58, BY - 22, 4],     // far right, slightly up

  // === Secondary branches: extend further outward ===
  // from far-left limb
  [CX - 55, BY - 25, CX - 85, BY - 35, 3],
  [CX - 55, BY - 25, CX - 78, BY - 50, 2],
  [CX - 55, BY - 25, CX - 65, BY - 55, 2],
  // from upper-left limb
  [CX - 30, BY - 40, CX - 55, BY - 62, 2],
  [CX - 30, BY - 40, CX - 40, BY - 68, 2],
  [CX - 30, BY - 40, CX - 18, BY - 65, 2],
  // from central limb
  [CX + 3,  BY - 45, CX - 12, BY - 70, 2],
  [CX + 3,  BY - 45, CX + 5,  BY - 72, 2],
  [CX + 3,  BY - 45, CX + 20, BY - 68, 2],
  // from upper-right limb
  [CX + 35, BY - 38, CX + 25, BY - 65, 2],
  [CX + 35, BY - 38, CX + 45, BY - 66, 2],
  [CX + 35, BY - 38, CX + 60, BY - 58, 2],
  // from far-right limb
  [CX + 58, BY - 22, CX + 80, BY - 32, 3],
  [CX + 58, BY - 22, CX + 82, BY - 48, 2],
  [CX + 58, BY - 22, CX + 70, BY - 52, 2],

  // === Tertiary twigs: fine tips reaching even further ===
  [CX - 85, BY - 35, CX - 100, BY - 42, 1],
  [CX - 85, BY - 35, CX - 95,  BY - 28, 1],
  [CX - 78, BY - 50, CX - 90,  BY - 60, 1],
  [CX - 65, BY - 55, CX - 72,  BY - 68, 1],
  [CX - 55, BY - 62, CX - 65,  BY - 76, 1],
  [CX - 40, BY - 68, CX - 45,  BY - 80, 1],
  [CX - 12, BY - 70, CX - 18,  BY - 82, 1],
  [CX + 5,  BY - 72, CX + 3,   BY - 84, 1],
  [CX + 20, BY - 68, CX + 25,  BY - 80, 1],
  [CX + 45, BY - 66, CX + 50,  BY - 78, 1],
  [CX + 60, BY - 58, CX + 68,  BY - 70, 1],
  [CX + 80, BY - 32, CX + 95,  BY - 38, 1],
  [CX + 82, BY - 48, CX + 95,  BY - 58, 1],
  [CX + 80, BY - 32, CX + 98,  BY - 26, 1],
  [CX - 18, BY - 65, CX - 25,  BY - 78, 1],
  [CX + 25, BY - 65, CX + 22,  BY - 78, 1],
];

function drawLinePixels(cvs, x1, y1, x2, y2, thick, color) {
  const dx = Math.abs(x2-x1), dy = Math.abs(y2-y1);
  const sx = x1 < x2 ? 1 : -1, sy = y1 < y2 ? 1 : -1;
  let err = dx - dy, x = x1, y = y1;
  const half = Math.floor(thick / 2);
  const c = cvs.getContext('2d');
  c.fillStyle = color;
  for (let iter = 0; iter < 500; iter++) {
    for (let tx = -half; tx <= half; tx++) {
      for (let ty = -half; ty <= half; ty++) {
        if (Math.abs(tx) + Math.abs(ty) <= half + (thick > 2 ? 1 : 0)) {
          c.fillRect(x + tx, y + ty, 1, 1);
        }
      }
    }
    if (x === x2 && y === y2) break;
    const e2 = 2 * err;
    if (e2 > -dy) { err -= dy; x += sx; }
    if (e2 < dx) { err += dx; y += sy; }
  }
}

function regenerateTree() {
  const cfg = SEASON_CONFIG[currentSeason];
  trunkCanvas = document.createElement('canvas');
  trunkCanvas.width = BASE_W; trunkCanvas.height = BASE_H;
  trunkCtx = trunkCanvas.getContext('2d');

  for (let y = TREE_BRANCH_Y; y <= TREE_BASE_Y; y++) {
    const t = (y - TREE_BRANCH_Y) / (TREE_BASE_Y - TREE_BRANCH_Y);
    const halfW = Math.floor(3.5 + t * 5.5);
    for (let dx = -halfW; dx <= halfW; dx++) {
      const x = TREE_CX + dx;
      const noise = seededRand(x * 31 + y * 17);
      let col = cfg.trunk;
      if (noise > 0.72) col = cfg.trunkAlt;
      if (dx <= -halfW + 1) col = cfg.trunkDark;
      trunkCtx.fillStyle = col;
      trunkCtx.fillRect(x, y, 1, 1);
    }
  }

  for (const b of BRANCH_DEFS) {
    const bColor = seededRand(b[0] * 7 + b[1] * 13) > 0.6 ? cfg.trunkAlt : cfg.trunk;
    drawLinePixels(trunkCanvas, b[0], b[1], b[2], b[3], b[4], bColor);
  }

  if (cfg.snowBranch) {
    for (const b of BRANCH_DEFS) {
      const dx = b[2] - b[0], dy = b[3] - b[1];
      const len = Math.sqrt(dx*dx + dy*dy);
      const steps = Math.floor(len);
      for (let i = 0; i < steps; i++) {
        const t = i / steps;
        const px = Math.floor(b[0] + dx * t);
        const py = Math.floor(b[1] + dy * t);
        if (seededRand(px * 41 + py * 73) > 0.35) {
          trunkCtx.fillStyle = '#F5F5F5';
          trunkCtx.fillRect(px, py - 1, 1, 1);
          if (b[4] >= 2) trunkCtx.fillRect(px + 1, py - 1, 1, 1);
        }
      }
    }
  }

  canopyCanvas = document.createElement('canvas');
  canopyCanvas.width = BASE_W; canopyCanvas.height = BASE_H;
  canopyCtx = canopyCanvas.getContext('2d');

  if (cfg.leafDensity > 0) {
    // Spreading canopy: leaf clusters around each branch endpoint
    // Gather all branch tips for leaf cluster placement
    const clusterPoints = [];
    for (const b of BRANCH_DEFS) {
      const tipX = b[2], tipY = b[3];
      const thick = b[4];
      // Bigger clusters for thicker branches, smaller for twigs
      const r = thick >= 3 ? 22 : (thick >= 2 ? 16 : 11);
      clusterPoints.push({ x: tipX, y: tipY, r });
    }
    // Add a few extra fill clusters to close gaps in the interior
    clusterPoints.push({ x: TREE_CX, y: TREE_BRANCH_Y - 55, r: 20 });
    clusterPoints.push({ x: TREE_CX - 20, y: TREE_BRANCH_Y - 50, r: 18 });
    clusterPoints.push({ x: TREE_CX + 22, y: TREE_BRANCH_Y - 48, r: 18 });
    clusterPoints.push({ x: TREE_CX - 45, y: TREE_BRANCH_Y - 40, r: 15 });
    clusterPoints.push({ x: TREE_CX + 48, y: TREE_BRANCH_Y - 38, r: 15 });
    clusterPoints.push({ x: TREE_CX - 70, y: TREE_BRANCH_Y - 35, r: 12 });
    clusterPoints.push({ x: TREE_CX + 72, y: TREE_BRANCH_Y - 33, r: 12 });

    // Determine bounding box for iteration
    let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
    for (const cp of clusterPoints) {
      minX = Math.min(minX, cp.x - cp.r - 5);
      maxX = Math.max(maxX, cp.x + cp.r + 5);
      minY = Math.min(minY, cp.y - cp.r - 5);
      maxY = Math.max(maxY, cp.y + cp.r + 5);
    }

    for (let y = minY; y <= maxY; y++) {
      for (let x = minX; x <= maxX; x++) {
        // Check if this pixel falls inside any leaf cluster
        let inside = false;
        for (const cp of clusterPoints) {
          const dx = (x - cp.x) / cp.r;
          const dy = (y - cp.y) / (cp.r * 0.75); // flatten vertically for spread look
          const d = dx * dx + dy * dy;
          const noise = seededRand(x * 31 + y * 17) * 0.35;
          const edgeNoise = seededRand(x * 7 + y * 53) * 0.2;
          if (d + noise + edgeNoise < 1.0) { inside = true; break; }
        }
        if (!inside) continue;
        // Density check
        if (seededRand(x * 13 + y * 29) >= cfg.leafDensity) continue;
        canopyCtx.fillStyle = cfg.canopy[Math.floor(seededRand(x * 19 + y * 41) * cfg.canopy.length)];
        canopyCtx.fillRect(x, y, 1, 1);
      }
    }

    // Highlight on top edges of each cluster for volume
    for (const cp of clusterPoints) {
      for (let x = cp.x - cp.r + 2; x <= cp.x + cp.r - 2; x++) {
        const edgeY = cp.y - Math.floor(Math.sqrt(Math.max(0, 1 - ((x - cp.x) / cp.r) ** 2)) * cp.r * 0.75);
        if (seededRand(x * 67 + cp.y * 11) > 0.55) {
          canopyCtx.fillStyle = lerpColor(pick(cfg.canopy), '#FFFFFF', 0.3);
          canopyCtx.fillRect(x, edgeY + 1, 1, 1);
        }
      }
    }

    // Underside shadow on bottom edge of outermost clusters
    for (const cp of clusterPoints) {
      for (let x = cp.x - cp.r + 3; x <= cp.x + cp.r - 3; x++) {
        const botY = cp.y + Math.floor(Math.sqrt(Math.max(0, 1 - ((x - cp.x) / cp.r) ** 2)) * cp.r * 0.75);
        if (seededRand(x * 43 + cp.y * 7) > 0.6) {
          canopyCtx.fillStyle = darkenColor(pick(cfg.canopy), 0.25);
          canopyCtx.fillRect(x, botY - 1, 1, 1);
        }
      }
    }

    // Flowers in spring — scatter across the canopy area
    if (cfg.hasFlowers) {
      for (let i = 0; i < 60; i++) {
        const cp = clusterPoints[Math.floor(seededRand(i * 17) * clusterPoints.length)];
        const angle = seededRand(i * 23) * Math.PI * 2;
        const r = seededRand(i * 31) * 0.8;
        const fx = Math.floor(cp.x + Math.cos(angle) * cp.r * r);
        const fy = Math.floor(cp.y + Math.sin(angle) * cp.r * 0.75 * r);
        const fc = seededRand(i * 43) > 0.5 ? cfg.flowers : cfg.flowerAlt;
        canopyCtx.fillStyle = fc;
        canopyCtx.fillRect(fx, fy, 1, 1);
        canopyCtx.fillRect(fx + 1, fy, 1, 1);
        if (seededRand(i * 59) > 0.5) canopyCtx.fillRect(fx, fy + 1, 1, 1);
      }
    }
  }
}

function renderTreeTrunk() {
  ctx.drawImage(trunkCanvas, 0, 0, BASE_W, BASE_H, 0, 0, canvas.width, canvas.height);
}
function renderTreeCanopy() {
  const windOff = currentWeather === 'windy'
    ? Math.sin(gameTime * 1.2) * 2 * scale
    : Math.sin(gameTime * 0.3) * 0.5 * scale;
  ctx.drawImage(canopyCanvas, 0, 0, BASE_W, BASE_H, windOff, 0, canvas.width, canvas.height);
}

// ============================================================
// SECTION 12: CLOUD SYSTEM
// ============================================================
function generateCloud(w, h) {
  const cvs = document.createElement('canvas');
  cvs.width = w; cvs.height = h;
  const c = cvs.getContext('2d');
  const circles = [
    { cx: w * 0.25, cy: h * 0.55, r: h * 0.42 },
    { cx: w * 0.5,  cy: h * 0.4,  r: h * 0.55 },
    { cx: w * 0.72, cy: h * 0.52, r: h * 0.38 },
    { cx: w * 0.38, cy: h * 0.6,  r: h * 0.35 },
  ];
  for (let y = 0; y < h; y++) {
    for (let x = 0; x < w; x++) {
      for (const ci of circles) {
        const dx = x - ci.cx, dy = y - ci.cy;
        if (dx*dx + dy*dy < ci.r*ci.r) {
          const bright = 230 + Math.floor(seededRand(x * 7 + y * 13) * 25);
          c.fillStyle = rgbToHex(bright, bright, bright);
          c.fillRect(x, y, 1, 1);
          break;
        }
      }
    }
  }
  return cvs;
}

function initClouds() {
  clouds = [];
  const defs = [
    { w: 28, h: 10, y: 35, speed: 4, alpha: 0.55 },
    { w: 35, h: 12, y: 55, speed: 3, alpha: 0.5 },
    { w: 22, h: 8,  y: 75, speed: 5, alpha: 0.45 },
    { w: 30, h: 11, y: 20, speed: 3.5, alpha: 0.4 },
  ];
  for (const d of defs) {
    clouds.push({
      sprite: generateCloud(d.w, d.h),
      x: Math.floor(seededRand(d.y * 31) * BASE_W),
      y: d.y, w: d.w, h: d.h, speed: d.speed, alpha: d.alpha
    });
  }
}

function updateClouds(dt) {
  for (const c of clouds) {
    c.x += c.speed * dt;
    if (c.x > BASE_W + 10) c.x = -c.w - 5;
  }
}

function renderClouds() {
  const show = currentWeather === 'cloudy' || currentWeather === 'rain' || currentWeather === 'fog';
  const baseAlpha = show ? 1.0 : 0.3;
  const tod = getTimeOfDay();
  const nightFade = (tod.period === 'night') ? 0.3 : 1;
  for (const c of clouds) {
    ctx.globalAlpha = c.alpha * baseAlpha * nightFade;
    ctx.drawImage(c.sprite, 0, 0, c.w, c.h,
      Math.floor(c.x) * scale, Math.floor(c.y) * scale, c.w * scale, c.h * scale);
  }
  ctx.globalAlpha = 1;
}

// ============================================================
// SECTION 13: PARTICLE SYSTEM
// ============================================================
function spawnParticle(type) {
  if (particles.length >= MAX_PARTICLES) return;
  const p = { type, x: 0, y: 0, vx: 0, vy: 0, life: 0, maxLife: 0, alpha: 1, size: 1,
              color: '#FFF', angle: 0, angularV: 0, frame: 0 };
  switch (type) {
    case 'rain':
      p.x = Math.random() * (BASE_W + 40) - 20; p.y = -5;
      p.vx = -25 - Math.random() * 20; p.vy = 200 + Math.random() * 80;
      p.life = p.maxLife = 2.5; p.color = '#A0C4E8'; p.alpha = 0.65; p.size = 3;
      break;
    case 'snow':
      p.x = Math.random() * (BASE_W + 20) - 10; p.y = -3;
      p.vy = 18 + Math.random() * 25; p.life = p.maxLife = 12;
      p.color = '#FFFFFF'; p.alpha = 0.75 + Math.random() * 0.25;
      p.size = Math.random() > 0.6 ? 2 : 1; p.angle = Math.random() * Math.PI * 2;
      break;
    case 'leaf':
      p.x = TREE_CX - 100 + Math.random() * 200;
      p.y = TREE_BRANCH_Y - 75 + Math.random() * 50;
      p.vy = 25 + Math.random() * 25; p.life = p.maxLife = 6;
      p.color = pick(['#E65100','#F57C00','#FFB300','#D84315','#FF8F00']);
      p.alpha = 0.9; p.size = 2;
      p.angle = Math.random() * Math.PI * 2; p.angularV = 1.5 + Math.random() * 2;
      break;
    case 'petal':
      p.x = TREE_CX - 95 + Math.random() * 190;
      p.y = TREE_BRANCH_Y - 70 + Math.random() * 40;
      p.vy = 12 + Math.random() * 15; p.life = p.maxLife = 7;
      p.color = Math.random() > 0.5 ? '#F8BBD0' : '#F48FB1';
      p.alpha = 0.8; p.size = 2; p.angle = Math.random() * Math.PI * 2;
      break;
    case 'splash':
      p.life = p.maxLife = 0.3; p.alpha = 0.5;
      p.color = '#B0D4F1'; p.size = 1; p.vy = -15; p.vx = (Math.random() - 0.5) * 20;
      break;
  }
  particles.push(p);
}

function updateParticles(dt) {
  const windExtra = currentWeather === 'windy' ? 40 : 0;
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.life -= dt;
    if (p.life <= 0 || p.y > BASE_H + 10 || p.x < -20 || p.x > BASE_W + 20) {
      particles.splice(i, 1); continue;
    }
    if (p.type === 'snow') p.vx = Math.sin(gameTime * 2 + p.angle) * 15 + windExtra * 0.3;
    else if (p.type === 'leaf') { p.vx = Math.sin(gameTime * 1.5 + p.angle) * 30 + windExtra * 0.5; p.angle += p.angularV * dt; }
    else if (p.type === 'petal') p.vx = Math.sin(gameTime * 1.2 + p.angle) * 18 + windExtra * 0.4;
    else if (p.type === 'rain') p.vx += windExtra * 0.3 * dt;

    p.x += (p.vx + windExtra * 0.1) * dt;
    p.y += p.vy * dt;

    if (p.type === 'rain' && p.y >= GROUND_Y) {
      if (particles.length < MAX_PARTICLES) {
        particles.push({ type: 'splash', x: p.x, y: GROUND_Y - 1, vx: 0, vy: -15,
          life: 0.25, maxLife: 0.25, alpha: 0.4, color: '#B0D4F1', size: 1,
          angle: 0, angularV: 0, frame: 0 });
      }
      particles.splice(i, 1);
    }
  }
  if (currentWeather === 'rain') { for (let i = 0; i < 4; i++) spawnParticle('rain'); }
  else if (currentWeather === 'snow') { if (Math.random() < 0.35) spawnParticle('snow'); }
  const cfg = SEASON_CONFIG[currentSeason];
  if (cfg.particle === 'leaves' && Math.random() < 0.04) spawnParticle('leaf');
  if (cfg.particle === 'petals' && Math.random() < 0.025) spawnParticle('petal');
  if (currentWeather === 'windy' && Math.random() < 0.06) spawnParticle('leaf');
}

function renderParticles(behindCanopy) {
  for (const p of particles) {
    const isBehind = p.type === 'rain' && p.y < TREE_BRANCH_Y - 10;
    if (behindCanopy !== isBehind) continue;
    const fadeIn = clamp(1 - p.life / p.maxLife, 0, 1);
    const fadeOut = clamp(p.life / 0.3, 0, 1);
    ctx.globalAlpha = p.alpha * Math.min(fadeIn * 5, fadeOut);
    if (p.type === 'rain') {
      ctx.fillStyle = p.color;
      ctx.fillRect(Math.floor(p.x) * scale, Math.floor(p.y) * scale, scale, p.size * scale);
    } else if (p.type === 'splash') {
      drawPixel(p.x, p.y, p.color);
      drawPixel(p.x - 1, p.y, p.color);
      drawPixel(p.x + 1, p.y, p.color);
    } else if (p.type === 'leaf') {
      const phase = Math.floor(p.angle * 2 / Math.PI) % 4;
      ctx.fillStyle = p.color;
      if (phase === 0 || phase === 2) ctx.fillRect(Math.floor(p.x) * scale, Math.floor(p.y) * scale, 2 * scale, 2 * scale);
      else ctx.fillRect(Math.floor(p.x) * scale, Math.floor(p.y) * scale, 3 * scale, scale);
    } else if (p.type === 'petal') {
      ctx.fillStyle = p.color;
      ctx.fillRect(Math.floor(p.x) * scale, Math.floor(p.y) * scale, 2 * scale, scale);
    } else {
      ctx.fillStyle = p.color;
      ctx.fillRect(Math.floor(p.x) * scale, Math.floor(p.y) * scale, p.size * scale, p.size * scale);
    }
  }
  ctx.globalAlpha = 1;
}

function renderSunshine() {
  const tod = getTimeOfDay();
  if (tod.period !== 'day' || currentWeather !== 'clear') return;
  ctx.globalAlpha = 0.08;
  ctx.strokeStyle = '#FFF8E1';
  ctx.lineWidth = 2 * scale;
  const baseX = 350 + Math.sin(gameTime * 0.3) * 20;
  for (let i = 0; i < 5; i++) {
    const x = baseX + i * 25;
    ctx.beginPath();
    ctx.moveTo(x * scale, 0);
    ctx.lineTo((x - 120) * scale, BASE_H * scale);
    ctx.stroke();
  }
  ctx.globalAlpha = 1;
}

function renderFog() {
  if (currentWeather !== 'fog') return;
  const pulse = 0.18 + Math.sin(gameTime * 0.8) * 0.08;
  ctx.fillStyle = `rgba(210, 215, 220, ${pulse})`;
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = 'rgba(200, 210, 215, 0.12)';
  for (let i = 0; i < 3; i++) {
    const fx = ((gameTime * 6 + i * 180) % (BASE_W + 100)) - 50;
    const fy = 180 + i * 30 + Math.sin(gameTime * 0.5 + i) * 10;
    ctx.beginPath();
    ctx.ellipse(fx * scale, fy * scale, 60 * scale, 15 * scale, 0, 0, Math.PI * 2);
    ctx.fill();
  }
}

// ============================================================
// SECTION 14: DUAL ANIMAL SYSTEM
// ============================================================
// Left animal rests to the left of tree, right animal to the right
const ANIMAL_REST = {
  bird:      { left: { x: 165, y: 193 }, right: { x: 310, y: 190 } },
  butterfly: { left: { x: 150, y: 248 }, right: { x: 320, y: 248 } },
  squirrel:  { left: { x: 160, y: GROUND_Y - 12 }, right: { x: 310, y: GROUND_Y - 12 } },
  rabbit:    { left: { x: 155, y: GROUND_Y - 11 }, right: { x: 315, y: GROUND_Y - 11 } }
};

const ANIMAL_SPEEDS = { bird: 65, butterfly: 32, squirrel: 85, rabbit: 55 };

function createAnimalPair(type) {
  const restL = ANIMAL_REST[type].left;
  const restR = ANIMAL_REST[type].right;

  const left = {
    type, spriteKey: type,
    x: -20, y: type === 'bird' ? restL.y - 5 : (type === 'butterfly' ? restL.y - 15 : GROUND_Y - 10),
    targetX: restL.x, targetY: restL.y,
    exitX: -30, exitY: type === 'bird' ? restL.y - 30 : (type === 'butterfly' ? -20 : GROUND_Y - 10),
    state: 'entering', dir: 1, animFrame: 0,
    speed: ANIMAL_SPEEDS[type], hopTimer: 0, hopPhase: 0, bobOffset: 0
  };

  const right = {
    type, spriteKey: type + '_b',
    x: BASE_W + 20, y: type === 'bird' ? restR.y - 5 : (type === 'butterfly' ? restR.y - 15 : GROUND_Y - 10),
    targetX: restR.x, targetY: restR.y,
    exitX: BASE_W + 30, exitY: type === 'bird' ? restR.y - 30 : (type === 'butterfly' ? -20 : GROUND_Y - 10),
    state: 'entering', dir: -1, animFrame: 0,
    speed: ANIMAL_SPEEDS[type], hopTimer: 0, hopPhase: 0, bobOffset: 0
  };

  return { left, right };
}

function updateSingleAnimal(a, dt) {
  if (!a) return;
  if (a.state === 'entering') {
    const dx = a.targetX - a.x, dy = a.targetY - a.y;
    const dist = Math.sqrt(dx * dx + dy * dy);
    if (dist < 2) {
      a.x = a.targetX; a.y = a.targetY; a.state = 'idle';
      a.dir = a.x < TREE_CX ? 1 : -1;
      return;
    }
    const spd = a.speed * dt;
    a.x += (dx / dist) * spd;
    if (a.type === 'bird') a.y += (dy / dist) * spd + Math.sin(gameTime * 5 + a.x * 0.1) * 0.8;
    else if (a.type === 'butterfly') { a.y += (dy / dist) * spd + Math.sin(gameTime * 4 + a.x * 0.15) * 1.2; a.x += Math.sin(gameTime * 3) * 0.5; }
    else if (a.type === 'rabbit') {
      a.hopTimer += dt;
      if (a.hopTimer >= 0.4) { a.hopTimer = 0; a.hopPhase = 1; }
      if (a.hopPhase > 0) { a.hopPhase -= dt * 4; a.bobOffset = -Math.sin(a.hopPhase * Math.PI) * 8; }
      else a.bobOffset = 0;
      a.y = a.targetY - Math.abs(a.bobOffset);
    } else a.y += (dy / dist) * spd;
  } else if (a.state === 'leaving') {
    const dx = a.exitX - a.x, dy = a.exitY - a.y;
    const dist = Math.sqrt(dx * dx + dy * dy);
    const spd = a.speed * 1.1 * dt;
    a.x += (dx / Math.max(1, dist)) * spd;
    if (a.type === 'bird') a.y += (dy / Math.max(1, dist)) * spd * 0.6 + Math.sin(gameTime * 5) * 0.6;
    else if (a.type === 'butterfly') a.y += (dy / Math.max(1, dist)) * spd * 0.5 + Math.sin(gameTime * 4) * 1;
    else if (a.type === 'rabbit') {
      a.hopTimer += dt;
      if (a.hopTimer >= 0.35) { a.hopTimer = 0; a.hopPhase = 1; }
      if (a.hopPhase > 0) { a.hopPhase -= dt * 4; a.bobOffset = -Math.sin(a.hopPhase * Math.PI) * 7; }
      else a.bobOffset = 0;
      a.y = GROUND_Y - 10 - Math.abs(a.bobOffset);
    } else a.y += (dy / Math.max(1, dist)) * spd;
  } else {
    if (a.type === 'butterfly') a.bobOffset = Math.sin(gameTime * 2) * 1.5;
    else if (a.type === 'bird') a.bobOffset = Math.sin(gameTime * 1.5) * 0.5;
  }
}

function updateAnimals(dt) {
  updateSingleAnimal(animalLeft, dt);
  updateSingleAnimal(animalRight, dt);
}

function bothAnimalsIdle() {
  return animalLeft && animalRight && animalLeft.state === 'idle' && animalRight.state === 'idle';
}

function bothAnimalsOffScreen() {
  const offL = !animalLeft || animalLeft.x < -25 || animalLeft.x > BASE_W + 25 || animalLeft.y < -25;
  const offR = !animalRight || animalRight.x < -25 || animalRight.x > BASE_W + 25 || animalRight.y < -25;
  return offL && offR;
}

function renderSingleAnimal(a) {
  if (!a) return;
  const sp = SP[a.spriteKey];
  if (!sp) return;
  const isMoving = a.state === 'entering' || a.state === 'leaving';
  const frames = isMoving ? sp.move : sp.idle;
  const frame = frames[animFrame % frames.length];
  const flipH = a.dir < 0;
  const drawY = a.y + (a.bobOffset || 0);
  drawSprite(frame, Math.floor(a.x), Math.floor(drawY), flipH);
}

function renderAnimals() {
  renderSingleAnimal(animalLeft);
  renderSingleAnimal(animalRight);
}

// ============================================================
// SECTION 15: CHAT BUBBLE SYSTEM
// ============================================================
function createBubble(text, anchorX, anchorY, type, side) {
  // type: 'speech' or 'thought'; side: 'left','right','center'
  return {
    text, chars: [...text], anchorX, anchorY, type, side,
    state: 'typing', visibleChars: 0, typeSpeed: 10,
    displayTime: 3.5, timer: 0, fadeAlpha: 1
  };
}

function updateBubble(dt) {
  if (!activeBubble) return;
  const b = activeBubble;
  b.timer += dt;
  if (b.state === 'typing') {
    b.visibleChars = Math.floor(b.timer * b.typeSpeed);
    if (b.visibleChars >= b.chars.length) {
      b.visibleChars = b.chars.length; b.state = 'visible'; b.timer = 0;
    }
  } else if (b.state === 'visible') {
    if (b.timer >= b.displayTime) { b.state = 'fading'; b.timer = 0; }
  } else if (b.state === 'fading') {
    b.fadeAlpha = Math.max(0, 1 - b.timer / 0.5);
  }
}

function isBubbleDone() {
  return activeBubble && activeBubble.state === 'fading' && activeBubble.fadeAlpha <= 0;
}

function renderBubbles() {
  if (!activeBubble) return;
  const b = activeBubble;
  const fontSize = 10;
  const padding = 5;
  const maxTextW = 120;
  const lineH = fontSize + 3;

  ctx.font = `${fontSize * scale}px Zpix, SimSun, "Microsoft YaHei", monospace`;
  const visibleText = b.chars.slice(0, b.visibleChars).join('');

  const lines = [];
  let line = '';
  for (const ch of [...visibleText]) {
    const test = line + ch;
    if (ctx.measureText(test).width > maxTextW * scale) { lines.push(line); line = ch; }
    else line = test;
  }
  if (line) lines.push(line);
  if (lines.length === 0) lines.push('');

  let maxW = 0;
  for (const l of lines) maxW = Math.max(maxW, ctx.measureText(l).width / scale);

  const bubW = Math.floor(maxW + padding * 2 + 2);
  const bubH = Math.floor(lines.length * lineH + padding * 2);

  let bx = Math.floor(b.anchorX - bubW / 2);
  let by = Math.floor(b.anchorY - bubH - 12);
  bx = clamp(bx, 4, BASE_W - bubW - 4);
  by = clamp(by, 4, BASE_H - bubH - 20);

  ctx.globalAlpha = b.fadeAlpha;

  const bgColor = b.type === 'thought' ? '#FFF8E1' : '#FFFFFF';
  const borderColor = b.type === 'thought' ? '#9E9E9E' : '#424242';

  drawRect(bx - 1, by - 1, bubW + 2, bubH + 2, borderColor);
  drawRect(bx, by, bubW, bubH, bgColor);

  if (b.type === 'speech') {
    const px = clamp(Math.floor(b.anchorX), bx + 4, bx + bubW - 4);
    drawRect(px - 2, by + bubH, 5, 1, borderColor);
    drawRect(px - 1, by + bubH + 1, 3, 1, borderColor);
    drawPixel(px, by + bubH + 2, borderColor);
    drawRect(px - 1, by + bubH, 3, 1, bgColor);
    drawPixel(px, by + bubH + 1, bgColor);
  } else {
    // Tree thought: dots going up to canopy center
    const tx = Math.floor(b.anchorX);
    drawRect(tx - 1, by + bubH + 2, 3, 3, borderColor);
    drawRect(tx, by + bubH + 3, 1, 1, bgColor);
    drawRect(tx + 2, by + bubH + 6, 2, 2, borderColor);
    drawPixel(tx + 4, by + bubH + 9, borderColor);
  }

  ctx.fillStyle = '#333';
  ctx.textBaseline = 'top';
  for (let i = 0; i < lines.length; i++) {
    ctx.fillText(lines[i], (bx + padding) * scale, (by + padding + i * lineH) * scale);
  }
  ctx.globalAlpha = 1;
}

// ============================================================
// SECTION 16: STATE MACHINE & SCHEDULER (dual-animal)
// ============================================================
function getTimings() { return isDemo ? TIMINGS.demo : TIMINGS.normal; }

function pickDialogueSet() {
  const sets = DIALOGUE[currentSeason];
  const avail = sets.map((_, i) => i).filter(i => !usedDlg[currentSeason].includes(i));
  if (avail.length === 0) { usedDlg[currentSeason] = []; return pick(sets); }
  const idx = pick(avail);
  usedDlg[currentSeason].push(idx);
  return sets[idx];
}

function getBubbleAnchor(speakerIdx) {
  // 0 = left animal, 1 = right animal
  const a = speakerIdx === 0 ? animalLeft : animalRight;
  if (!a) return { x: TREE_CX, y: GROUND_Y - 30 };
  return { x: a.x + 6, y: a.y - 2 };
}

function showDialogueLine(entry) {
  // entry = [speakerIdx, text]
  const [speaker, text] = entry;
  const anchor = getBubbleAnchor(speaker);
  activeBubble = createBubble(text, anchor.x, anchor.y, 'speech', speaker === 0 ? 'left' : 'right');
}

// States: QUIET -> ANIMAL_ENTER -> GREET -> GREET_REPLY -> CHAT -> BYE -> BYE_REPLY -> ANIMAL_EXIT -> TREE_THINK -> COOLDOWN -> QUIET
function transitionTo(state) {
  smState = state;
  smTimer = 0;

  switch (state) {
    case 'ANIMAL_ENTER': {
      const type = SEASON_ANIMALS[currentSeason];
      const pair = createAnimalPair(type);
      animalLeft = pair.left;
      animalRight = pair.right;
      chatIdx = 0;
      activeBubble = null;
      currentNewsTopics = '';

      // Pop dialogue from cache (instant!) or fall back to mock
      if (llmCache.length > 0 && llmCacheSeason === currentSeason) {
        currentDlg = llmCache.shift();
        currentNewsTopics = currentDlg.newsTopics || '';
        console.log('[Dialogue] Using cached LLM data:', currentNewsTopics);
      } else {
        currentDlg = pickDialogueSet();
        console.log('[Dialogue] Cache empty, using mock data');
      }
      break;
    }
    case 'GREET':
      showDialogueLine(currentDlg.greet);
      break;
    case 'GREET_REPLY':
      showDialogueLine(currentDlg.greetReply);
      break;
    case 'CHAT':
      chatIdx = 0;
      showDialogueLine(currentDlg.chat[0]);
      break;
    case 'BYE':
      showDialogueLine(currentDlg.bye);
      // Start fetching tree summary while animals say goodbye
      llmSummaryText = '';
      if (LLM_CONFIG.apiKey && currentNewsTopics) {
        fetchTreeSummary(currentNewsTopics).then(text => {
          llmSummaryText = text;
          console.log('[Summary] Ready:', text);
        }).catch(e => {
          console.warn('[Summary] Failed:', e.message);
        });
      }
      break;
    case 'BYE_REPLY':
      showDialogueLine(currentDlg.byeReply);
      break;
    case 'ANIMAL_EXIT':
      if (animalLeft) { animalLeft.state = 'leaving'; animalLeft.dir = -1; }
      if (animalRight) { animalRight.state = 'leaving'; animalRight.dir = 1; }
      activeBubble = null;
      break;
    case 'TREE_THINK': {
      const summary = llmSummaryText || currentDlg.think || '……';
      activeBubble = createBubble(summary, TREE_CX, TREE_BRANCH_Y - 80, 'thought', 'center');
      animalLeft = null;
      animalRight = null;
      break;
    }
    case 'COOLDOWN':
      activeBubble = null;
      break;
    case 'QUIET':
      animalLeft = null;
      animalRight = null;
      currentDlg = null;
      activeBubble = null;
      break;
  }
}

function updateStateMachine(dt) {
  smTimer += dt;
  const T = getTimings();

  switch (smState) {
    case 'QUIET':
      if (smTimer >= T.quiet) transitionTo('ANIMAL_ENTER');
      break;
    case 'ANIMAL_ENTER':
      if (bothAnimalsIdle()) transitionTo('GREET');
      break;
    case 'GREET':
      if (isBubbleDone()) transitionTo('GREET_REPLY');
      break;
    case 'GREET_REPLY':
      if (isBubbleDone()) transitionTo('CHAT');
      break;
    case 'CHAT':
      if (isBubbleDone()) {
        chatIdx++;
        if (chatIdx >= currentDlg.chat.length) {
          transitionTo('BYE');
        } else {
          showDialogueLine(currentDlg.chat[chatIdx]);
        }
      }
      break;
    case 'BYE':
      if (isBubbleDone()) transitionTo('BYE_REPLY');
      break;
    case 'BYE_REPLY':
      if (isBubbleDone()) transitionTo('ANIMAL_EXIT');
      break;
    case 'ANIMAL_EXIT':
      if (bothAnimalsOffScreen()) transitionTo('TREE_THINK');
      break;
    case 'TREE_THINK':
      if (isBubbleDone()) transitionTo('COOLDOWN');
      break;
    case 'COOLDOWN':
      if (smTimer >= T.cooldown) transitionTo('QUIET');
      break;
  }
}

// ============================================================
// SECTION 17: DEMO UI
// ============================================================
const UI_BTNS = [
  { id: 'demo', x: BASE_W - 62, y: BASE_H - 58, w: 55, h: 12,
    label: () => isDemo ? 'Demo: ON' : 'Demo: OFF',
    action: () => {
      isDemo = !isDemo;
      if (isDemo && smState === 'QUIET') smTimer = Math.max(smTimer, getTimings().quiet - 5);
    }
  },
  { id: 'season', x: BASE_W - 62, y: BASE_H - 44, w: 55, h: 12,
    label: () => ({ spring:'Spring', summer:'Summer', autumn:'Autumn', winter:'Winter' })[currentSeason],
    action: () => {
      currentSeason = SEASON_LIST[(SEASON_LIST.indexOf(currentSeason) + 1) % 4];
      seasonOverride = true; regenerateTree(); particles = [];
    }
  },
  { id: 'weather', x: BASE_W - 62, y: BASE_H - 30, w: 55, h: 12,
    label: () => ({ clear:'Clear', cloudy:'Cloudy', rain:'Rain', snow:'Snow', fog:'Fog', windy:'Windy' })[currentWeather],
    action: () => {
      currentWeather = WEATHER_LIST[(WEATHER_LIST.indexOf(currentWeather) + 1) % WEATHER_LIST.length];
      particles = [];
    }
  },
  { id: 'summon', x: BASE_W - 62, y: BASE_H - 16, w: 55, h: 12,
    label: () => 'Summon!',
    action: () => {
      if (smState === 'QUIET' || smState === 'COOLDOWN') transitionTo('ANIMAL_ENTER');
    }
  }
];

function renderUI() {
  const fontSize = 8;
  ctx.font = `${fontSize * scale}px Zpix, monospace`;
  ctx.textBaseline = 'middle';

  for (const btn of UI_BTNS) {
    const hover = mouseX >= btn.x && mouseX <= btn.x + btn.w &&
                  mouseY >= btn.y && mouseY <= btn.y + btn.h;
    drawRect(btn.x - 1, btn.y - 1, btn.w + 2, btn.h + 2, '#666666');
    drawRect(btn.x, btn.y, btn.w, btn.h, hover ? '#555555' : '#333333');
    ctx.fillStyle = hover ? '#FFFFFF' : '#CCCCCC';
    const label = btn.label();
    const tw = ctx.measureText(label).width;
    ctx.fillText(label, (btn.x + (btn.w * scale - tw) / scale / 2) * scale, (btn.y + btn.h / 2) * scale);
  }

  if (isDemo) {
    ctx.globalAlpha = 0.5 + Math.sin(gameTime * 3) * 0.3;
    ctx.font = `${8 * scale}px Zpix, monospace`;
    ctx.fillStyle = '#FF5252';
    ctx.textBaseline = 'top';
    ctx.fillText('DEMO', 6 * scale, 6 * scale);
    ctx.globalAlpha = 1;
  }

  ctx.globalAlpha = 0.35;
  ctx.font = `${7 * scale}px Zpix, monospace`;
  ctx.fillStyle = '#FFF';
  ctx.textBaseline = 'top';
  const stateNames = {
    QUIET: 'Waiting...', ANIMAL_ENTER: 'Coming...',
    GREET: 'Hello!', GREET_REPLY: 'Hello!',
    CHAT: 'Chatting', BYE: 'Goodbye', BYE_REPLY: 'Goodbye',
    ANIMAL_EXIT: 'Leaving...', TREE_THINK: 'Thinking...', COOLDOWN: '...'
  };
  let statusLabel = stateNames[smState] || smState;
  const remaining = smState === 'QUIET' ? ` (${Math.max(0, Math.floor(getTimings().quiet - smTimer))}s)` : '';
  // Show LLM cache status
  const cacheInfo = LLM_CONFIG.apiKey ? ` [${llmCache.length}/${LLM_CACHE_MAX}]` : '';
  if (llmBusy) {
    const dots = '.'.repeat(1 + Math.floor(gameTime * 2) % 3);
    statusLabel = 'Caching' + dots + cacheInfo;
  } else if (smState === 'QUIET' || smState === 'COOLDOWN') {
    statusLabel += remaining + cacheInfo;
  } else {
    statusLabel += remaining;
  }
  ctx.fillText(statusLabel, 6 * scale, (isDemo ? 18 : 6) * scale);
  ctx.globalAlpha = 1;
}

canvas.addEventListener('mousemove', (e) => {
  const rect = canvas.getBoundingClientRect();
  mouseX = (e.clientX - rect.left) / scale;
  mouseY = (e.clientY - rect.top) / scale;
});
canvas.addEventListener('click', (e) => {
  const rect = canvas.getBoundingClientRect();
  const mx = (e.clientX - rect.left) / scale;
  const my = (e.clientY - rect.top) / scale;
  for (const btn of UI_BTNS) {
    if (mx >= btn.x && mx <= btn.x + btn.w && my >= btn.y && my <= btn.y + btn.h) {
      btn.action(); break;
    }
  }
});
canvas.addEventListener('mouseleave', () => { mouseX = mouseY = -1; });

// ============================================================
// SECTION 18: SEASON AUTO-DETECTION
// ============================================================
function detectSeason() {
  if (seasonOverride) return;
  const m = new Date().getMonth();
  if (m >= 2 && m <= 4) currentSeason = 'spring';
  else if (m >= 5 && m <= 7) currentSeason = 'summer';
  else if (m >= 8 && m <= 10) currentSeason = 'autumn';
  else currentSeason = 'winter';
}

// ============================================================
// SECTION 19: TREE GLOW EFFECT (during TREE_THINK)
// ============================================================
function renderTreeGlow() {
  if (smState !== 'TREE_THINK') return;
  const pulse = 0.06 + Math.sin(gameTime * 2) * 0.04;
  const cx = TREE_CX, cy = TREE_BRANCH_Y - 45;
  const rx = 100, ry = 45;
  ctx.globalAlpha = pulse;
  ctx.fillStyle = currentSeason === 'winter' ? '#E3F2FD' : '#FFF8E1';
  ctx.beginPath();
  ctx.ellipse(cx * scale, cy * scale, rx * scale, ry * scale, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.globalAlpha = 1;
}

// ============================================================
// SECTION 20: MAIN LOOP & INITIALIZATION
// ============================================================
let lastTime = 0;

function gameLoop(timestamp) {
  if (!lastTime) lastTime = timestamp;
  const dt = Math.min((timestamp - lastTime) / 1000, 0.1);
  lastTime = timestamp;
  gameTime += dt;

  animTimer += dt;
  if (animTimer >= ANIM_RATE) { animTimer -= ANIM_RATE; animFrame++; }

  // Periodic weather fetch via LLM (every hour)
  if (LLM_CONFIG.apiKey && gameTime - lastWeatherFetch > 3600) {
    lastWeatherFetch = gameTime;
    fetchWeather();
  }

  // Pre-fetch LLM dialogues during idle time
  updateLLMCache();

  // Updates
  updateClouds(dt);
  updateParticles(dt);
  updateAnimals(dt);
  updateBubble(dt);
  updateStateMachine(dt);

  // --- Render ---
  renderSky();
  renderStars();
  renderSunMoon();
  renderSunshine();
  renderClouds();
  renderHills();
  renderGround();
  renderTreeTrunk();
  renderParticles(true);
  renderTreeCanopy();
  renderTreeGlow();
  renderParticles(false);
  renderAnimals();
  renderBubbles();
  renderFog();
  renderUI();

  requestAnimationFrame(gameLoop);
}

function init() {
  calcScale();
  initSprites();
  detectSeason();
  regenerateTree();
  initClouds();
  smState = 'QUIET';
  smTimer = 0;

  // Initial weather fetch via LLM
  if (LLM_CONFIG.apiKey) {
    lastWeatherFetch = 0;
    fetchWeather().then(() => {
      console.log('[Init] Weather loaded');
    });
    // Start caching dialogues immediately
    llmLastFetchTime = -9999; // allow immediate first fetch
  }

  requestAnimationFrame(gameLoop);
}

// init() is now called after API key input, see above
</script>
